services:
  drdocsis:
    build: .
    container_name: drdocsis
    restart: unless-stopped
    ports:
      - "8780:8780"
    volumes:
      - drdocsis_data:/data
    environment:
      - CONTRACT_DOWN_MBIT=250
      - CONTRACT_UP_MBIT=50
      - SLA_PERCENT=90
      - TEST_DURATION=15

volumes:
  drdocsis_data:
